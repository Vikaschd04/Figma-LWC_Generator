<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Salesforce LWC Accelerator</title>
    <style>
      /* Design Tokens & Theme Variables */
      :root {
        --slds-color-brand: #0176d3;
        --slds-color-brand-hover: #014b82;
        --slds-color-text-default: #181818;
        --slds-color-text-weak: #444444;
        --slds-color-background: #f3f3f3;
        --slds-color-border: #c9c9c9;
        --slds-color-success: #2e7d32;
        --slds-color-error: #ea001e;
        --slds-color-warning: #b78103;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 12px;
        line-height: 1.5;
        color: var(--slds-color-text-default);
        margin: 0;
        background-color: var(--slds-color-background);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Header */
      .header {
        background-color: white;
        border-bottom: 1px solid var(--slds-color-border);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .header-logo {
        font-size: 18px;
      }

      .header-title {
        font-size: 14px;
        font-weight: 700;
        margin: 0;
        color: var(--slds-color-brand);
      }

      /* Scrollable container */
      .container {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Cards & Groups */
      .card {
        background-color: white;
        border: 1px solid var(--slds-color-border);
        border-radius: 4px;
        padding: 16px;
      }

      .selection-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-weight: 700;
        font-size: 13px;
      }

      .selection-details {
        color: var(--slds-color-text-weak);
        margin: 0;
        font-size: 11px;
      }

      /* Badges */
      .badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 12px;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .badge-empty {
        background-color: #f3f3f3;
        color: #747474;
        border: 1px solid #c9c9c9;
      }

      .badge-active {
        background-color: #eaf5fe;
        color: var(--slds-color-brand);
        border: 1px solid #a2d2fa;
      }

      /* Form controls */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }

      .form-group:last-child {
        margin-bottom: 0;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      label {
        font-weight: 600;
        color: var(--slds-color-text-weak);
        font-size: 11px;
      }

      .form-control {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--slds-color-border);
        border-radius: 4px;
        font-size: 12px;
        outline: none;
        background-color: white;
      }

      .form-control:focus {
        border-color: var(--slds-color-brand);
        box-shadow: 0 0 0 1px var(--slds-color-brand);
      }

      .form-control:disabled {
        background-color: #f3f3f3;
        color: #747474;
        cursor: not-allowed;
      }

      /* Buttons */
      .btn {
        background-color: var(--slds-color-brand);
        color: white;
        border: 1px solid transparent;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        outline: none;
      }

      .btn:hover:not(:disabled) {
        background-color: var(--slds-color-brand-hover);
      }

      .btn:disabled {
        background-color: #c9c9c9;
        cursor: not-allowed;
        color: #747474;
      }

      .btn-secondary {
        background-color: white;
        color: #0176d3;
        border: 1px solid var(--slds-color-border);
      }

      .btn-secondary:hover:not(:disabled) {
        background-color: #f3f3f3;
      }

      /* File Tabs & Preview */
      .file-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        border-bottom: 1px solid var(--slds-color-border);
        padding-bottom: 6px;
        margin-bottom: 8px;
      }

      .subtab {
        font-size: 11px;
        padding: 4px 8px;
        background-color: #e2e8f0;
        border-radius: 4px;
        cursor: pointer;
        color: #475569;
        font-weight: 500;
      }

      .subtab.active {
        background-color: var(--slds-color-brand);
        color: white;
      }

      .code-container {
        flex: 1;
        background-color: #1e293b;
        border: 1px solid #0f172a;
        border-radius: 4px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        min-height: 250px;
        max-height: 400px;
      }

      .code-box {
        width: 100%;
        flex: 1;
        background: transparent;
        border: none;
        color: #f8fafc;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        resize: none;
        outline: none;
        white-space: pre;
        overflow: auto;
      }

      /* Loader */
      .spinner {
        border: 3px solid rgba(255, 255, 255, 0.3);
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border-left-color: white;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Status Notifications */
      .alert {
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 11px;
        display: none;
      }

      .alert-success {
        background-color: #e8f5e9;
        color: var(--slds-color-success);
        border: 1px solid #c8e6c9;
        display: block;
      }

      .alert-error {
        background-color: #ffebee;
        color: var(--slds-color-error);
        border: 1px solid #ffcdd2;
        display: block;
      }

      .alert-warning {
        background-color: #fff3e0;
        color: var(--slds-color-warning);
        border: 1px solid #ffe0b2;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="header-logo">⚡</div>
      <h1 class="header-title">Figma Visual LWC Generator</h1>
    </div>

    <div class="container">
      <!-- Selection Card -->
      <div class="card">
        <div class="selection-title">
          <span id="node-name">No Selection</span>
          <span id="node-badge" class="badge badge-empty">None</span>
        </div>
        <p class="selection-details" id="node-info">
          Please select a layout frame on your canvas to capture its visual mockup screenshot.
        </p>
      </div>

      <!-- Config Form -->
      <div class="card">
        <div class="form-group">
          <label for="comp-name-input">Component Name</label>
          <input
            type="text"
            class="form-control"
            id="comp-name-input"
            placeholder="myComponent"
            disabled
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="target-select">Target Platform</label>
            <select class="form-control" id="target-select" disabled>
              <option value="lightning__RecordPage">Record Page</option>
              <option value="lightning__AppPage">App Page</option>
              <option value="lightning__HomePage">Home Page</option>
              <option value="lightningCommunity__Page">Experience Page</option>
            </select>
          </div>

          <div class="form-group">
            <label for="api-version-input">API Version</label>
            <input
              type="text"
              class="form-control"
              id="api-version-input"
              value="61.0"
              disabled
            />
          </div>
        </div>

        <!-- User Story Details -->
        <div style="border-top: 1px solid var(--slds-color-border); margin: 12px 0; padding-top: 12px;">
          <div class="form-group">
            <label for="story-title-input">User Story Title (Optional)</label>
            <input
              type="text"
              class="form-control"
              id="story-title-input"
              placeholder="e.g. User Profile Card UI"
              disabled
            />
          </div>

          <div class="form-group">
            <label for="story-description-input">Description</label>
            <textarea
              class="form-control"
              id="story-description-input"
              rows="2"
              placeholder="e.g. Displays current profile statistics..."
              disabled
              style="resize: none;"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="story-criteria-input">Acceptance Criteria (Comma-separated)</label>
            <input
              type="text"
              class="form-control"
              id="story-criteria-input"
              placeholder="e.g. Must support edit button, must fit grid structure"
              disabled
            />
          </div>
        </div>

        <button class="btn" id="generate-btn" disabled onclick="generateLwc()">
          <div class="spinner" id="btn-spinner" style="display: none"></div>
          ⚡ Generate LWC Code
        </button>
        <div class="alert" id="status-alert" style="margin-top: 12px;"></div>
      </div>

      <!-- Generated Files Output Area -->
      <div id="generation-result" class="card" style="display: none; flex-direction: column;">
        <div class="file-tabs" id="file-tabs-container"></div>
        <div class="code-container">
          <textarea class="code-box" id="preview-box" readonly></textarea>
        </div>
        <button class="btn btn-secondary" style="margin-top: 8px;" onclick="copyPreviewCode()">📋 Copy Code</button>
      </div>
    </div>

    <script>
      let activeNode = null;
      let activeImageBase64 = null;
      let generatedFiles = {};
      let activeFileKey = '';

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === 'selection') {
          const node = msg.node;
          activeNode = node;

          if (msg.imageBytes) {
            activeImageBase64 = arrayBufferToBase64(msg.imageBytes);
          } else {
            activeImageBase64 = null;
          }

          const nodeNameEl = document.getElementById('node-name');
          const nodeBadgeEl = document.getElementById('node-badge');
          const nodeInfoEl = document.getElementById('node-info');
          const compNameInput = document.getElementById('comp-name-input');
          const targetSelect = document.getElementById('target-select');
          const apiVersionInput = document.getElementById('api-version-input');
          const generateBtn = document.getElementById('generate-btn');

          if (node) {
            nodeNameEl.innerText = node.name;
            nodeBadgeEl.innerText = node.type;
            nodeBadgeEl.className = 'badge badge-active';

            let detailText = `Node ID: ${node.id}`;
            if (node.width && node.height) {
              detailText += ` • Captured Screenshot Size: ${Math.round(node.width)}x${Math.round(node.height)}`;
            }
            nodeInfoEl.innerText = detailText;

            compNameInput.disabled = false;
            compNameInput.value = toCamelCase(node.name);
            targetSelect.disabled = false;
            apiVersionInput.disabled = false;
            document.getElementById('story-title-input').disabled = false;
            document.getElementById('story-description-input').disabled = false;
            document.getElementById('story-criteria-input').disabled = false;
            generateBtn.disabled = false;
          } else {
            nodeNameEl.innerText = 'No Selection';
            nodeBadgeEl.innerText = 'None';
            nodeBadgeEl.className = 'badge badge-empty';
            nodeInfoEl.innerText = 'Please select a layout frame on your canvas to capture its visual mockup screenshot.';

            compNameInput.disabled = true;
            compNameInput.value = '';
            targetSelect.disabled = true;
            apiVersionInput.disabled = true;
            document.getElementById('story-title-input').disabled = true;
            document.getElementById('story-title-input').value = '';
            document.getElementById('story-description-input').disabled = true;
            document.getElementById('story-description-input').value = '';
            document.getElementById('story-criteria-input').disabled = true;
            document.getElementById('story-criteria-input').value = '';
            generateBtn.disabled = true;

            document.getElementById('generation-result').style.display = 'none';
            hideAlert();
          }
        }
      };

      function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
      }

      async function generateLwc() {
        if (!activeNode || !activeImageBase64) {
          showAlert('Please select a valid layout frame containing visual canvas elements.', 'error');
          return;
        }

        const compName = document.getElementById('comp-name-input').value.trim();
        if (!/^[a-z][a-zA-Z0-9]*$/.test(compName)) {
          showAlert(
            'Component name must be camelCase (start with lowercase letter, alphanumeric only).',
            'error'
          );
          return;
        }

        const target = document.getElementById('target-select').value;
        const apiVersion = document.getElementById('api-version-input').value.trim();

        const spinner = document.getElementById('btn-spinner');
        const generateBtn = document.getElementById('generate-btn');

        spinner.style.display = 'block';
        generateBtn.disabled = true;
        hideAlert();

        const storyTitle = document.getElementById('story-title-input').value.trim();
        const storyDesc = document.getElementById('story-description-input').value.trim();
        const storyCriteriaText = document.getElementById('story-criteria-input').value.trim();

        let userStory = undefined;
        if (storyTitle || storyDesc || storyCriteriaText) {
          userStory = {
            title: storyTitle || 'Selected Component Story',
            description: storyDesc || '',
            acceptanceCriteria: storyCriteriaText
              ? storyCriteriaText
                  .split(',')
                  .map((s) => s.trim())
                  .filter(Boolean)
              : []
          };
        }

        try {
          const response = await fetch(
            'https://figma-to-lwc-accelerator.vercel.app/api/generate-lwc',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                componentName: compName,
                imageBase64: activeImageBase64,
                options: {
                  target: target,
                  apiVersion: apiVersion,
                  generateReadme: true
                },
                userStory: userStory
              })
            }
          );

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.message || errData.error || 'Server error generating code.');
          }

          const data = await response.json();

          generatedFiles = {};
          data.files.forEach((file) => {
            const name = file.path.split('/').pop();
            generatedFiles[name] = file.content;
          });

          renderFileTabs();

          if (data.warnings && data.warnings.length > 0) {
            showAlert(
              `LWC generated with ${data.warnings.length} warning(s). Check output.`,
              'warning'
            );
          } else {
            showAlert('LWC Code generated successfully!', 'success');
          }

          notifyFigma('LWC Code generated!');
        } catch (err) {
          showAlert(
            `Generation failed: ${err.message}. Ensure the backend service is running.`,
            'error'
          );
        } finally {
          spinner.style.display = 'none';
          generateBtn.disabled = false;
        }
      }

      function renderFileTabs() {
        const container = document.getElementById('file-tabs-container');
        container.innerHTML = '';

        const fileNames = Object.keys(generatedFiles);
        if (fileNames.length === 0) return;

        fileNames.forEach((fileName, index) => {
          const tab = document.createElement('div');
          tab.className = 'subtab';
          if (index === 0) {
            tab.classList.add('active');
            activeFileKey = fileName;
            updatePreviewCode(fileName);
          }
          tab.innerText = fileName;
          tab.onclick = () => {
            document.querySelectorAll('.subtab').forEach((t) => t.classList.remove('active'));
            tab.classList.add('active');
            activeFileKey = fileName;
            updatePreviewCode(fileName);
          };
          container.appendChild(tab);
        });

        document.getElementById('generation-result').style.display = 'flex';
      }

      function updatePreviewCode(fileName) {
        document.getElementById('preview-box').value = generatedFiles[fileName] || '';
      }

      function copyPreviewCode() {
        const previewBox = document.getElementById('preview-box');
        if (!previewBox.value) return;
        try {
          previewBox.select();
          document.execCommand('copy');
          notifyFigma(`${activeFileKey} code copied!`);
        } catch (err) {
          alert('Copy failed: ' + err);
        }
      }

      function notifyFigma(msg) {
        parent.postMessage({ pluginMessage: { type: 'notify', message: msg } }, '*');
      }

      function showAlert(msg, type) {
        const alertEl = document.getElementById('status-alert');
        alertEl.innerText = msg;
        alertEl.className = 'alert alert-' + type;
        alertEl.style.display = 'block';
      }

      function hideAlert() {
        const alertEl = document.getElementById('status-alert');
        alertEl.style.display = 'none';
      }

      function toCamelCase(str) {
        return str
          .replace(/[^a-zA-Z0-9]+(.)/g, (m, chr) => chr.toUpperCase())
          .replace(/[^a-zA-Z0-9]/g, '')
          .replace(/^(.)/, (m, chr) => chr.toLowerCase());
      }
    </script>
  </body>
</html>
